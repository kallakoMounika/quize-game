<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score</title>

  <style>
    body{
      text-align:center;
      font-family: Arial;
      background:#ecf5ff;
    }

    h1{
      margin-top:50px;
    }

    h2{
      font-size:40px;
      color:#56a5eb;
    }
  </style>
</head>

<body>

<h1>Your Score</h1>
<h2 id="finalScore">0</h2>

<script>
  // Make sure DOM is loaded before accessing element
  window.onload = function() {
    const score = localStorage.getItem("mostRecentScore");
    document.getElementById("finalScore").innerText = score || 0;
  };
</script>

</body>
</html>
